before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: sancho

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  use: github-native

homebrews:
  - name: sancho
    tap:
      owner: marioaer
      name: homebrew-tap
    folder: Formula
    homepage: "https://github.com/marioaer/sancho"
    description: "CLI for delegating coding tasks to LLMs"
