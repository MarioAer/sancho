[tools]
go = "1.26"
golangci-lint = "2.12.2"

[tasks.check]
description = "Run all verification checks (fmt, vet, lint, staticcheck)"
depends = ["check:fmt", "check:vet", "check:lint", "check:static"]

[tasks."check:fmt"]
description = "Check code formatting"
run = "gofmt -l ."

[tasks."check:fmt:fix"]
description = "Fix code formatting"
run = "gofmt -w ."

[tasks."check:vet"]
description = "Run go vet"
run = "go vet ./..."

[tasks."check:lint"]
description = "Run linter"
run = "golangci-lint run"

[tasks."check:lint:fix"]
description = "Run linter with auto-fix"
run = "golangci-lint run --fix"

[tasks."check:static"]
description = "Run staticcheck"
run = "go run honnef.co/go/tools/cmd/staticcheck@latest ./..."

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.build]
description = "Build the project binary"
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["sancho"]
run = "go build -o sancho ."

[tasks.run]
description = "Build and run the CLI (pass args after --)"
depends = ["build"]
run = "./sancho ${@}"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f sancho"

[tasks.default]
alias = "check"
